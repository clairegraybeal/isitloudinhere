<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#e3e3e3" />
  <title>is it loud in here</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="screen" data-state="idle">
    <p class="readout"><span id="db-value">--</span> dB is</p>
    <div class="meter">
      <div class="bars" id="meter-bars"></div>
      <h1 class="verdict verdict--stroke" id="verdict-stroke" aria-hidden="true">tap to start</h1>
      <h1 class="verdict verdict--fill" id="verdict">tap to start</h1>
    </div>
    <footer>
      <span class="hint" id="hint">mic stays on-device. nothing is recorded.</span>
      <span class="domain">isitloudinhere.com</span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
