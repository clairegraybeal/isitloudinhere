<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#e3e3e3" />
  <title>is it loud in here</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="start-screen">
    <h2 class="title">is it loud in here?</h2>
    <button id="start">tap to find out</button>
    <p class="hint">we need your mic to measure how loud it is. nothing is recorded or sent anywhere.</p>
  </div>

  <main id="screen" data-state="not-too-loud" hidden>
    <p class="readout"><span id="db-value">--</span> dB is</p>
    <div class="meter">
      <div class="bars" id="meter-bars"></div>
      <h1 class="verdict verdict--stroke" id="verdict-stroke" aria-hidden="true">not<br>too loud</h1>
      <h1 class="verdict verdict--fill" id="verdict">not<br>too loud</h1>
    </div>
    <footer>isitloudinhere.com</footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
